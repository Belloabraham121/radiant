# Radiant backend infrastructure — deploy anytime with:
#   docker compose up -d
#   docker compose down
#
# Full stack (infra + API container):
#   cp .env.example .env   # fill secrets; set docker URLs below
#   docker compose --profile app up -d --build
#
# Optional E2B orphan cleanup loop (dev/staging). Requires E2B_API_KEY on host.
#   cd backend && npm run e2b:cleanup:cron
#
# See api-ref.md and .env.docker.example for app env vars.
# The `api` service loads secrets from .env via env_file and overrides
# DATABASE_URL / REDIS_URL / RABBITMQ_URL to use compose service hostnames.

name: radiant

services:
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: radiant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-radiant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-radiant}
      POSTGRES_DB: ${POSTGRES_DB:-radiant}
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-radiant} -d ${POSTGRES_DB:-radiant}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - radiant

  redis:
    build:
      context: ./docker/redis
      dockerfile: Dockerfile
    container_name: radiant-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - radiant

  rabbitmq:
    build:
      context: ./docker/rabbitmq
      dockerfile: Dockerfile
    container_name: radiant-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-radiant}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-radiant}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - "${RABBITMQ_PORT:-5673}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15673}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - radiant

  api:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: radiant-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3001}
      # Always use compose network hostnames (ignore localhost URLs from .env).
      DATABASE_URL: postgresql://${POSTGRES_USER:-radiant}:${POSTGRES_PASSWORD:-radiant}@postgres:5432/${POSTGRES_DB:-radiant}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-radiant}:${RABBITMQ_PASSWORD:-radiant}@rabbitmq:5672${RABBITMQ_VHOST:-/}
    ports:
      - "${PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - radiant

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  radiant:
    driver: bridge
