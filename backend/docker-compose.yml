# Radiant backend infrastructure — deploy anytime with:
#   docker compose up -d
#   docker compose down
#
# See api-ref.md for DATABASE_URL, REDIS_URL, and app env vars.

name: radiant

services:
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: radiant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-radiant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-radiant}
      POSTGRES_DB: ${POSTGRES_DB:-radiant}
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-radiant} -d ${POSTGRES_DB:-radiant}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - radiant

  redis:
    build:
      context: ./docker/redis
      dockerfile: Dockerfile
    container_name: radiant-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - radiant

  rabbitmq:
    build:
      context: ./docker/rabbitmq
      dockerfile: Dockerfile
    container_name: radiant-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-radiant}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-radiant}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - "${RABBITMQ_PORT:-5673}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15673}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - radiant

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  radiant:
    driver: bridge
